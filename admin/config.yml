backend:
  name: github
  repo: JEON-DAEJIN/blog
  branch: main

site_url: https://jeon-daejin.github.io/blog
display_url: https://jeon-daejin.github.io/blog

# 업로드한 이미지가 저장되는 위치(저장소 기준 경로)와
# 실제 블로그에서 접근되는 경로(baseurl "/blog" 포함)
media_folder: "assets/img/uploads"
public_folder: "/blog/assets/img/uploads"

publish_mode: simple

collections:
  - name: "posts"
    label: "글"
    label_singular: "글"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    sortable_fields: ["date", "title"]
    fields:
      - { label: "제목", name: "title", widget: "string" }
      - { label: "작성일", name: "date", widget: "datetime", format: "YYYY-MM-DD HH:mm:ss Z" }
      - label: "카테고리"
        name: "categories"
        widget: "select"
        options: ["AI 개념정리", "개발 기록", "회고"]
        multiple: true
        min: 1
        max: 1
      - { label: "태그", name: "tags", widget: "list", default: [] }
      - { label: "요약", name: "description", widget: "string", required: false }
      - { label: "본문", name: "body", widget: "markdown" }
