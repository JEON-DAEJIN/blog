backend:
  name: git-gateway
  repo: JEON-DAEJIN/blog
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/b8423f55-9c7f-4e04-b795-b461ec572f3d/pkce
  auth_token_endpoint: /sites/b8423f55-9c7f-4e04-b795-b461ec572f3d/token
  gateway_url: https://gateway.decapbridge.com

  # 누가 언제 글을 올렸는지 커밋 메시지에 남기기
  commit_messages:
    create: Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

logo_url: https://decapbridge.com/decapcms-with-bridge.svg

site_url: https://jeon-daejin.github.io/blog
display_url: https://jeon-daejin.github.io/blog

# 업로드한 이미지가 저장되는 위치(저장소 기준 경로)와
# 실제 블로그에서 접근되는 경로(baseurl "/blog" 포함)
media_folder: "assets/img/uploads"
public_folder: "/blog/assets/img/uploads"

publish_mode: simple

collections:
  - name: "posts"
    label: "글"
    label_singular: "글"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    sortable_fields: ["date", "title"]
    fields:
      - { label: "제목", name: "title", widget: "string" }
      - { label: "작성일", name: "date", widget: "datetime", format: "YYYY-MM-DD HH:mm:ss Z" }
      - label: "카테고리"
        name: "categories"
        widget: "select"
        options: ["AI 개념정리", "개발 기록", "회고"]
        multiple: true
        min: 1
        max: 1
      - { label: "태그", name: "tags", widget: "list", default: [] }
      - { label: "요약", name: "description", widget: "string", required: false }
      - { label: "본문", name: "body", widget: "markdown" }
