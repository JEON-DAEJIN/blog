name: "📝 새 블로그 글"
description: "모바일이나 어디서든 이 폼을 채우면 자동으로 포스트가 생성되어 게시됩니다."
title: "[POST] "
labels: ["new-post"]
body:
  - type: input
    id: post-title
    attributes:
      label: 제목
      placeholder: "예) 트랜스포머 어텐션 개념 정리"
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: 카테고리
      options:
        - AI 개념정리
        - 개발 기록
        - 회고
    validations:
      required: true

  - type: input
    id: tags
    attributes:
      label: 태그 (쉼표로 구분)
      placeholder: "예) ai, pytorch"

  - type: input
    id: summary
    attributes:
      label: 요약 (검색결과/공유 시 보여줄 한두 줄)

  - type: textarea
    id: content
    attributes:
      label: 본문 (마크다운)
      description: >
        `##` 소제목으로 구분하고, 강조하고 싶은 내용은 `>` 인용구로 적어보세요.
      placeholder: |
        ## 오늘 배운 것

        ## 겪은 시행착오

        > 강조하고 싶은 핵심 내용

        ## 다음에 할 것
    validations:
      required: true
