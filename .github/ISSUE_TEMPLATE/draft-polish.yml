name: "✍️ 초안 다듬기"
description: "러프한 생각을 적으면 Claude가 블로그 스타일에 맞게 다듬은 초안을 댓글로 제안합니다 (자동 게시 아님)"
title: "[DRAFT] "
labels: ["draft-polish"]
body:
  - type: textarea
    id: rough-text
    attributes:
      label: 러프한 생각
      description: 순서나 문장 다듬기는 신경 쓰지 말고, 생각나는 대로 편하게 적어주세요.
      placeholder: |
        오늘 뭘 했는지, 뭘 배웠는지, 막혔던 부분, 다음에 할 것 등을 자유롭게 나열해주세요.
    validations:
      required: true

  - type: dropdown
    id: category-hint
    attributes:
      label: 카테고리 힌트 (선택)
      description: 확실치 않으면 "모르겠음, Claude가 판단"을 선택하세요.
      options:
        - "모르겠음, Claude가 판단"
        - "AI 개념정리"
        - "개발 기록"
        - "회고"
      default: 0
