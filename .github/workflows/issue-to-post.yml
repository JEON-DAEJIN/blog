name: "Issue to Post"

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write
  actions: write

jobs:
  create-post:
    # 보안: 저장소 소유자 본인이, "새 블로그 글" 폼으로 연 이슈만 자동 게시 대상으로 처리합니다.
    # (이슈 폼의 labels는 라벨이 저장소에 미리 존재해야만 자동 적용되므로 라벨 대신
    #  폼 전용 섹션 마커(### 제목)로 판별합니다.)
    if: |
      github.event.issue.user.login == github.repository_owner &&
      contains(github.event.issue.body, '### 제목')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Parse issue and create post file
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            function escapeRegex(s) {
              return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            }

            function section(body, label) {
              const re = new RegExp(
                `### ${escapeRegex(label)}\\s*\\n\\s*([\\s\\S]*?)(?=\\n### |$)`
              );
              const m = body.match(re);
              let val = m ? m[1].trim() : '';
              if (val === '_No response_') val = '';
              return val;
            }

            const body = context.payload.issue.body || '';
            const title = section(body, '제목');
            const category = section(body, '카테고리');
            const tagsRaw = section(body, '태그 (쉼표로 구분)');
            const description = section(body, '요약 (검색결과/공유 시 보여줄 한두 줄)');
            const content = section(body, '본문 (마크다운)');

            if (!title || !content) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: '⚠️ 제목 또는 본문을 읽지 못했습니다. 이슈 폼 형식 그대로 작성했는지 확인해주세요.',
              });
              core.setFailed('title or content missing');
              return;
            }

            const tags = tagsRaw
              ? tagsRaw.split(',').map((t) => t.trim()).filter(Boolean).join(', ')
              : '';

            // GitHub Actions 러너는 UTC로 동작하므로, KST(+9h)로 보정한 시각을 사용합니다.
            const KST_OFFSET_MS = 9 * 60 * 60 * 1000;
            const now = new Date(Date.now() + KST_OFFSET_MS);
            const pad = (n) => String(n).padStart(2, '0');
            const date = `${now.getUTCFullYear()}-${pad(now.getUTCMonth() + 1)}-${pad(now.getUTCDate())}`;
            const datetime = `${date} ${pad(now.getUTCHours())}:${pad(now.getUTCMinutes())}:${pad(now.getUTCSeconds())} +0900`;

            const slug = title.trim().replace(/\s+/g, '-').replace(/[\/\\:*?"<>|#]/g, '');
            let filename = `_posts/${date}-${slug}.md`;
            if (fs.existsSync(filename)) {
              filename = `_posts/${date}-${slug}-${context.issue.number}.md`;
            }

            const escapedTitle = title.replace(/"/g, '\\"');
            const escapedDesc = description.replace(/"/g, '\\"');

            const front = [
              '---',
              `title: "${escapedTitle}"`,
              `date: ${datetime}`,
              `categories: [${category}]`,
              `tags: [${tags}]`,
              `description: "${escapedDesc}"`,
              '---',
              '',
              content,
              '',
            ].join('\n');

            fs.mkdirSync('_posts', { recursive: true });
            fs.writeFileSync(filename, front, 'utf8');

            core.setOutput('filename', filename);
            core.setOutput('post_title', title);

      - name: Commit and push
        id: commit
        env:
          # 제목에 따옴표 등 특수문자가 섞여도 쉘 명령어가 깨지지 않도록
          # 텍스트를 직접 끼워넣지 않고 환경변수로 전달합니다.
          POST_FILENAME: ${{ steps.create.outputs.filename }}
          POST_TITLE: ${{ steps.create.outputs.post_title }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$POST_FILENAME"
          git commit -m "post: $POST_TITLE"
          git push
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Trigger site deploy
        # GITHUB_TOKEN으로 만든 push는 다른 워크플로(Build and Deploy)를 자동으로
        # 트리거하지 않으므로, 배포 워크플로를 명시적으로 실행 요청합니다.
        # workflow_dispatch의 ref는 브랜치/태그 이름만 허용되고 커밋 SHA는 못 써서,
        # 대신 main 브랜치 참조가 방금 push한 커밋으로 갱신될 때까지 잠깐 기다렸다가
        # 배포를 걸어서, 이전 커밋이 빌드되는 경합 문제를 피합니다.
        uses: actions/github-script@v7
        env:
          COMMIT_SHA: ${{ steps.commit.outputs.sha }}
        with:
          script: |
            const expectedSha = process.env.COMMIT_SHA;
            for (let i = 0; i < 10; i++) {
              const { data: branch } = await github.rest.repos.getBranch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                branch: 'main',
              });
              if (branch.commit.sha === expectedSha) break;
              await new Promise((r) => setTimeout(r, 1000));
            }

            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'pages-deploy.yml',
              ref: 'main',
            });

      - name: Comment and close issue
        uses: actions/github-script@v7
        env:
          POST_FILENAME: ${{ steps.create.outputs.filename }}
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `✅ 포스트가 생성되어 게시되었습니다: \`${process.env.POST_FILENAME}\`\n잠시 후 블로그에 반영됩니다.`,
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
            });
